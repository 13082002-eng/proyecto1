<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | Inés Sacristán</title>
  <link rel="stylesheet" href="CSS/reset.css">
  <link rel="stylesheet" href="CSS/styles.css">
</head>

<body class="contacto">
<div id="header"></div>
<main>
    <h1 class="contacto">Contacto</h1>
    <p class="parrafo">¿Tienes alguna pregunta o propuesta? Rellena el formulario y me pondré en contacto contigo lo antes posible.</p>
    <form action="https://formsubmit.co/inessacristan13@gmail.com" method="POST">

    <input type="hidden" name="_subject" value="Nuevo mensaje desde CV Portfolio">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    
        <label for="name">Nombre:</label>
        <input type="text" id="name" name="name" placeholder="Tu nombre" required>
    
        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" required>
           
        <label for="asunto">Asunto:</label>
        <input type="text" id="asunto" name="asunto" placeholder="Asunto del mensaje" required>
            
        <label for="mensaje">Mensaje:</label>
        <textarea id="mensaje" name="mensaje" placeholder="Escribe tu mensaje aquí..." required></textarea>
          
        <button type="submit">Enviar</button>
    </form>
</main>
<div id="footer"></div>

<script type="module" src="./JAVASCRIPT/main.js"></script>

</body>
</html>
